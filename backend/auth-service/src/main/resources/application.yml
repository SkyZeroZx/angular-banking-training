server:
  port: ${SERVER_PORT:8091}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:h2:mem:auth-service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:banking-local-secret-key-for-jwt-token-generation-2024-must-be-at-least-256-bits}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

app:
  seed:
    enabled: ${APP_SEED_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.localbank.banking.auth: INFO
