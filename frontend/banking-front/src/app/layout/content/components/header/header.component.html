<header class="header" role="banner">
  <a class="header__logo" routerLink="/">BANCO</a>

  <div class="header__actions">
    @if (user(); as u) {
      <span class="header__user">{{ u.sub }}</span>
    }
    <button type="button" class="header__logout" (click)="logout()">
      Salir
    </button>
  </div>
</header>
