<div class="login">
  <div class="login__card">
    <h1 class="login__title">BANCO</h1>
    <p class="login__subtitle">Iniciar sesion</p>

    @if (error(); as err) {
      <p class="login__error" role="alert">{{ err }}</p>
    }

    <form class="login__form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          autocomplete="username"
          placeholder="Ingrese su usuario"
        >
      </div>
      <div>
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Ingrese su password"
        >
      </div>

      <button type="submit" [disabled]="loading()">Ingresar</button>
    </form>
  </div>
</div>
